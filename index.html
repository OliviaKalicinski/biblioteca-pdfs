    <!-- GTM Event Tracking Scripts -->
    <script>
      // Initialize dataLayer
      window.dataLayer = window.dataLayer || [];
      
      // Track login form submissions
      document.addEventListener('DOMContentLoaded', function() {
        // Track login button clicks
        setTimeout(function() {
          const loginButtons = document.querySelectorAll('button[type="submit"]');
          loginButtons.forEach(function(btn) {
            if (btn.textContent && (btn.textContent.includes('Entrar') || btn.textContent.includes('Fazer Login'))) {
              btn.addEventListener('click', function() {
                window.dataLayer.push({
                  'event': 'loginFormSubmit',
                  'buttonText': btn.textContent.trim(),
                  'formName': 'Login'
                });
                console.log('Evento loginFormSubmit enviado ao GTM');
              });
            }
          });
          
          // Track PDF download buttons
          const downloadButtons = document.querySelectorAll('button');
          downloadButtons.forEach(function(btn) {
            if (btn.textContent && btn.textContent.includes('Download')) {
              btn.addEventListener('click', function() {
                const pdfCard = btn.closest('.bg-white');
                const pdfTitle = pdfCard ? pdfCard.querySelector('h3')?.textContent : 'Unknown';
                window.dataLayer.push({
                  'event': 'pdfDownload',
                  'pdfTitle': pdfTitle,
                  'buttonText': btn.textContent.trim()
                });
                console.log('Evento pdfDownload enviado ao GTM:', pdfTitle);
              });
            }
          });
          
          // Track logout button clicks
          const logoutButtons = document.querySelectorAll('button');
          logoutButtons.forEach(function(btn) {
            if (btn.textContent && (btn.textContent.includes('Sair') || btn.textContent.includes('Logout'))) {
              btn.addEventListener('click', function() {
                window.dataLayer.push({
                  'event': 'userLogout',
                  'buttonText': btn.textContent.trim()
                });
                console.log('Evento userLogout enviado ao GTM');
              });
            }
          });
        }, 1000); // Wait for React to render
      });
    </script>
    <!-- End GTM Event Tracking Scripts -->
